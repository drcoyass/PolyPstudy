name: Daily PubMed Research Sync

on:
  schedule:
    - cron: '0 0 * * *' # 日本時間の午前9時に毎日実行
  workflow_dispatch: # 手動でも動かせるようにする

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install deep-translator

      - name: Run sync script and Guard
        run: |
          python sync_all_research.py
          python translate_missing_intel.py
          python portal_guardian.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/latest_papers.json guardian_log.txt
          git commit -m "Auto-update: Sync and Guardian Audit ($(date +'%Y-%m-%d'))" || echo "No changes to commit"
          git push
